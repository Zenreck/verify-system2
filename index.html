<!DOCTYPE html>
<html>
<head>
  <title>Secure Login System</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      overflow: hidden;
      background: black;
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      z-index: -1;
    }

    /* CENTER LOGIN */
    .center {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    /* LOGIN CARD (modern dark glass) */
    .card {
      background: rgba(30, 30, 30, 0.9);
      backdrop-filter: blur(10px);
      padding: 25px;
      border-radius: 14px;
      width: 320px;
      text-align: center;
      color: white;
      box-shadow: 0 0 20px rgba(0,0,0,0.6);
    }

    input {
      width: 90%;
      padding: 10px;
      margin: 8px 0;
      border-radius: 8px;
      border: none;
      outline: none;
      background: #111;
      color: white;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-top: 8px;
      border: none;
      border-radius: 8px;
      background: #3b82f6;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #2563eb;
    }

    /* DASHBOARD OVERLAY */
    .dashboard {
      position: fixed;
      inset: 0;
      display: none;
      justify-content: center;
      align-items: center;
    }

    .panel {
      width: 420px;
      background: rgba(40, 40, 40, 0.85);
      backdrop-filter: blur(12px);
      border-radius: 16px;
      padding: 25px;
      color: white;
      box-shadow: 0 0 30px rgba(0,0,0,0.7);
    }

    .profile {
      background: rgba(60,60,60,0.4);
      padding: 15px;
      border-radius: 10px;
      margin-top: 10px;
    }

    .logout {
      margin-top: 15px;
      background: #ef4444;
    }

    .hidden {
      display: none;
    }
  </style>
</head>

<body>

<canvas id="matrix"></canvas>

<!-- LOGIN -->
<div id="loginPage" class="center">
  <div class="card">
    <h2>Login</h2>

    <input id="phone" placeholder="Phone (+1...)" />

    <button onclick="sendCode()">Send Code</button>

    <div id="verifyBox" class="hidden">
      <input id="code" placeholder="Enter code" />
      <button onclick="verify()">Verify</button>
    </div>

    <p id="msg"></p>
  </div>
</div>

<!-- DASHBOARD OVERLAY -->
<div id="dashboard" class="dashboard">
  <div class="panel">
    <h2>Dashboard</h2>

    <div class="profile">
      <p><b>Phone:</b> <span id="userPhone"></span></p>
      <p><b>Status:</b> Online</p>
    </div>

    <button class="logout" onclick="logout()">Logout</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
/* =========================
   SUPABASE
========================= */
const supabaseUrl = "https://emookzuveekpfqbehcjs.supabase.co";
const supabaseKey = "sb_publishable_XUZwKSJb_dsiYTkeEK79yw_lpCW5u9p";
const client = supabase.createClient(supabaseUrl, supabaseKey);

/* =========================
   STATE
========================= */
let code = "";
let phone = "";

/* =========================
   SESSION (LOCAL STORAGE)
========================= */
function saveSession(p) {
  localStorage.setItem("session", p);
}

function getSession() {
  return localStorage.getItem("session");
}

function clearSession() {
  localStorage.removeItem("session");
}

/* =========================
   AUTO LOGIN CHECK
========================= */
window.onload = () => {
  const s = getSession();
  if (s) showDashboard(s);
};

/* =========================
   SEND SMS
========================= */
async function sendCode() {
  phone = document.getElementById("phone").value;

  if (!phone) return msg("Enter phone");

  code = Math.floor(100000 + Math.random() * 900000).toString();

  msg("Sending...");

  const res = await fetch(
    "https://api.textbee.dev/api/v1/gateway/devices/69ed9e62b5cd3ce4c792ae3e/send-sms",
    {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-api-key": "33a89932-1944-4e37-8c09-c58b18136575"
      },
      body: JSON.stringify({
        recipients: [phone],
        message: "CODE: " + code
      })
    }
  );

  const text = await res.text();

  if (!res.ok) {
    msg("SMS FAILED");
    return;
  }

  msg("Code sent");
  document.getElementById("verifyBox").classList.remove("hidden");
}

/* =========================
   VERIFY
========================= */
async function verify() {
  const input = document.getElementById("code").value;

  if (input === code) {
    saveSession(phone);

    await client.from("users").upsert([
      { phone: phone, verified: true }
    ]);

    showDashboard(phone);
  } else {
    msg("Wrong code");
  }
}

/* =========================
   DASHBOARD SWITCH
========================= */
function showDashboard(p) {
  document.getElementById("loginPage").style.display = "none";
  document.getElementById("dashboard").style.display = "flex";
  document.getElementById("userPhone").innerText = p;
}

/* =========================
   LOGOUT
========================= */
function logout() {
  clearSession();
  location.reload();
}

/* =========================
   MSG
========================= */
function msg(t) {
  document.getElementById("msg").innerText = t;
}

/* =========================
   MATRIX BACKGROUND
========================= */
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

canvas.height = window.innerHeight;
canvas.width = window.innerWidth;

let chars = "01".split("");
let fontSize = 14;
let cols = canvas.width / fontSize;

let drops = Array(Math.floor(cols)).fill(1);

function draw() {
  ctx.fillStyle = "rgba(0,0,0,0.05)";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle = "#3b82f6";
  ctx.font = fontSize + "px monospace";

  for (let i = 0; i < drops.length; i++) {
    let text = chars[Math.floor(Math.random()*chars.length)];
    ctx.fillText(text, i*fontSize, drops[i]*fontSize);

    if (drops[i]*fontSize > canvas.height) drops[i] = 0;
    drops[i]++;
  }
}

setInterval(draw, 30);
</script>

</body>
</html>
