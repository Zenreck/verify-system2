<!DOCTYPE html>
<html>
<head>
  <title>Enterprise Auth System</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: black;
      overflow: hidden;
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      z-index: -1;
    }

    /* LOGIN */
    .login {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: rgba(30,30,30,0.92);
      backdrop-filter: blur(12px);
      padding: 25px;
      border-radius: 16px;
      width: 340px;
      color: white;
      text-align: center;
      box-shadow: 0 0 30px rgba(0,0,0,0.6);
    }

    input {
      width: 90%;
      padding: 10px;
      margin: 8px 0;
      border-radius: 8px;
      border: none;
      background: #111;
      color: white;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-top: 8px;
      border-radius: 8px;
      border: none;
      background: #3b82f6;
      color: white;
      cursor: pointer;
    }

    .admin {
      background: #ef4444;
    }

    /* APP */
    .app {
      display: none;
      height: 100vh;
      color: white;
    }

    .sidebar {
      width: 240px;
      height: 100vh;
      position: fixed;
      background: rgba(20,20,20,0.9);
      padding: 15px;
    }

    .main {
      margin-left: 240px;
      padding: 20px;
    }

    .panel {
      background: rgba(40,40,40,0.6);
      padding: 20px;
      border-radius: 12px;
    }

    .badge {
      padding: 4px 8px;
      background: #3b82f6;
      border-radius: 6px;
      font-size: 12px;
    }

    .logout {
      background: #ef4444;
      margin-top: 10px;
    }

    .hidden { display:none; }
  </style>
</head>

<body>

<canvas id="matrix"></canvas>

<!-- LOGIN -->
<div id="login" class="login">
  <div class="card">
    <h2>ENTERPRISE LOGIN</h2>

    <input id="phone" placeholder="Phone (+1...)" />

    <button onclick="sendCode()">Send Code</button>

    <button class="admin" onclick="adminLogin()">
      Admin Login
    </button>

    <div id="verifyBox" class="hidden">
      <input id="code" placeholder="Enter code" />
      <button onclick="verify()">Verify</button>
    </div>

    <p id="msg"></p>
  </div>
</div>

<!-- APP -->
<div id="app" class="app">

  <div class="sidebar">
    <h3>Control Panel</h3>

    <p>User: <span id="userPhone"></span></p>
    <p>Role: <span id="roleBadge" class="badge"></span></p>

    <button class="logout" onclick="logout()">Logout</button>
  </div>

  <div class="main">
    <div class="panel">
      <h2>Dashboard</h2>
      <p>Secure enterprise session active.</p>
    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
/* =========================
   SUPABASE
========================= */
const supabaseUrl = "https://emookzuveekpfqbehcjs.supabase.co";
const supabaseKey = "sb_publishable_XUZwKSJb_dsiYTkeEK79yw_lpCW5u9p";
const client = supabase.createClient(supabaseUrl, supabaseKey);

/* =========================
   STATE
========================= */
let code = "";
let phone = "";

/* =========================
   SESSION (ENTERPRISE STYLE)
========================= */
function setSession(token) {
  localStorage.setItem("session", token);
}

function getSession() {
  return localStorage.getItem("session");
}

function clearSession() {
  localStorage.removeItem("session");
}

/* =========================
   ADMIN LOGIN
========================= */
function adminLogin() {
  phone = "3502287887";
  sendCode();
}

/* =========================
   SEND OTP
========================= */
async function sendCode() {

  if (!phone) {
    phone = document.getElementById("phone").value;
  }

  if (!phone) return msg("Enter phone");

  code = Math.floor(100000 + Math.random() * 900000).toString();

  msg("Sending...");

  const res = await fetch(
    "https://api.textbee.dev/api/v1/gateway/devices/69ed9e62b5cd3ce4c792ae3e/send-sms",
    {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-api-key": "33a89932-1944-4e37-8c09-c58b18136575"
      },
      body: JSON.stringify({
        recipients: [phone],
        message: "ENTERPRISE CODE: " + code
      })
    }
  );

  if (!res.ok) return msg("SMS FAILED");

  document.getElementById("verifyBox").classList.remove("hidden");
  msg("Code sent");
}

/* =========================
   VERIFY + ENTERPRISE SESSION
========================= */
async function verify() {
  const input = document.getElementById("code").value;

  if (input !== code) return msg("Wrong code");

  const sessionToken = crypto.randomUUID();

  const { data } = await client
    .from("users")
    .upsert({
      phone,
      verified: true,
      role: phone === "3502287887" ? "admin" : "user",
      session: sessionToken
    })
    .select();

  setSession(sessionToken);

  openApp(phone, phone === "3502287887" ? "admin" : "user");
}

/* =========================
   LOAD APP (VERIFY SESSION)
========================= */
async function openApp(p, role) {

  document.getElementById("login").style.display = "none";
  document.getElementById("app").style.display = "block";

  document.getElementById("userPhone").innerText = p;
  document.getElementById("roleBadge").innerText = role.toUpperCase();
}

/* =========================
   LOGOUT
========================= */
function logout() {
  clearSession();
  location.reload();
}

/* =========================
   MSG
========================= */
function msg(t) {
  document.getElementById("msg").innerText = t;
}

/* =========================
   MATRIX
========================= */
const c = document.getElementById("matrix");
const ctx = c.getContext("2d");

c.width = window.innerWidth;
c.height = window.innerHeight;

let drops = Array(120).fill(1);

function draw() {
  ctx.fillStyle = "rgba(0,0,0,0.05)";
  ctx.fillRect(0,0,c.width,c.height);

  ctx.fillStyle = "#3b82f6";
  ctx.font = "14px monospace";

  for (let i = 0; i < drops.length; i++) {
    let text = Math.random() > 0.5 ? "0" : "1";
    ctx.fillText(text, i*14, drops[i]*14);

    if (drops[i]*14 > c.height) drops[i] = 0;
    drops[i]++;
  }
}

setInterval(draw, 30);
</script>

</body>
</html>
