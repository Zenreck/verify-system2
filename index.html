<!DOCTYPE html>
<html>
<head>
  <title>Secure Login System</title>

  <style>
    body {
      margin: 0;
      font-family: monospace;
      color: #00ff88;
      background: black;
      overflow: hidden;
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      z-index: -1;
    }

    .center {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: rgba(0,0,0,0.8);
      border: 1px solid #00ff88;
      padding: 25px;
      border-radius: 10px;
      width: 320px;
      text-align: center;
      box-shadow: 0 0 20px #00ff88;
    }

    input {
      width: 90%;
      padding: 10px;
      margin: 8px 0;
      background: black;
      border: 1px solid #00ff88;
      color: #00ff88;
      outline: none;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-top: 8px;
      background: black;
      border: 1px solid #00ff88;
      color: #00ff88;
      cursor: pointer;
    }

    button:hover {
      background: #00ff88;
      color: black;
    }

    .hidden { display: none; }

    .glitch {
      font-size: 18px;
      animation: flicker 1s infinite;
    }

    @keyframes flicker {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .dash {
      padding: 20px;
    }

    .profile {
      border: 1px solid #00ff88;
      padding: 15px;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<canvas id="matrix"></canvas>

<!-- LOGIN -->
<div id="loginPage" class="center">
  <div class="card">
    <div class="glitch">SYSTEM LOGIN</div>

    <input id="phone" placeholder="Phone (+1...)" />

    <button onclick="sendCode()">SEND CODE</button>

    <div id="verifyBox" class="hidden">
      <input id="code" placeholder="ENTER CODE" />
      <button onclick="verify()">VERIFY</button>
    </div>

    <p id="msg"></p>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="hidden dash">
  <h2>WELCOME USER</h2>

  <div class="profile">
    <p><b>Phone:</b> <span id="userPhone"></span></p>
    <p><b>Status:</b> VERIFIED</p>
  </div>

  <button onclick="logout()">LOGOUT</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
/* =========================
   SUPABASE
========================= */
const supabaseUrl = "https://emookzuveekpfqbehcjs.supabase.co";
const supabaseKey = "sb_publishable_XUZwKSJb_dsiYTkeEK79yw_lpCW5u9p";
const client = supabase.createClient(supabaseUrl, supabaseKey);

/* =========================
   STATE
========================= */
let code = "";
let phone = "";

/* =========================
   SESSION (PERSIST LOGIN)
========================= */
function saveSession(phone) {
  localStorage.setItem("session_phone", phone);
}

function loadSession() {
  return localStorage.getItem("session_phone");
}

function clearSession() {
  localStorage.removeItem("session_phone");
}

/* =========================
   LOGIN CHECK ON LOAD
========================= */
window.onload = () => {
  const saved = loadSession();
  if (saved) {
    showDashboard(saved);
  }
};

/* =========================
   SEND SMS
========================= */
async function sendCode() {
  phone = document.getElementById("phone").value;

  if (!phone) {
    msg("ENTER PHONE");
    return;
  }

  code = Math.floor(100000 + Math.random() * 900000).toString();

  msg("SENDING CODE...");

  const res = await fetch("https://api.textbee.dev/api/v1/gateway/devices/69ed9e62b5cd3ce4c792ae3e/send-sms", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-api-key": "33a89932-1944-4e37-8c09-c58b18136575"
    },
    body: JSON.stringify({
      recipients: [phone],
      message: "CODE: " + code
    })
  });

  const text = await res.text();
  console.log(text);

  if (!res.ok) {
    msg("SMS FAILED");
    return;
  }

  msg("CODE SENT");
  document.getElementById("verifyBox").classList.remove("hidden");
}

/* =========================
   VERIFY
========================= */
async function verify() {
  const input = document.getElementById("code").value;

  if (input === code) {
    msg("ACCESS GRANTED");

    saveSession(phone);

    await client.from("users").upsert([
      { phone: phone, verified: true }
    ]);

    showDashboard(phone);

  } else {
    msg("WRONG CODE");
  }
}

/* =========================
   DASHBOARD
========================= */
function showDashboard(phone) {
  document.getElementById("loginPage").classList.add("hidden");
  document.getElementById("dashboard").classList.remove("hidden");
  document.getElementById("userPhone").innerText = phone;
}

/* =========================
   LOGOUT
========================= */
function logout() {
  clearSession();
  location.reload();
}

/* =========================
   UI MSG
========================= */
function msg(t) {
  document.getElementById("msg").innerText = t;
}

/* =========================
   MATRIX BACKGROUND
========================= */
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

canvas.height = window.innerHeight;
canvas.width = window.innerWidth;

let letters = "01";
letters = letters.split("");

const fontSize = 14;
const columns = canvas.width / fontSize;

const drops = [];

for (let x = 0; x < columns; x++)
  drops[x] = 1;

function draw() {
  ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = "#00ff88";
  ctx.font = fontSize + "px monospace";

  for (let i = 0; i < drops.length; i++) {
    const text = letters[Math.floor(Math.random() * letters.length)];
    ctx.fillText(text, i * fontSize, drops[i] * fontSize);

    if (drops[i] * fontSize > canvas.height || Math.random() > 0.95)
      drops[i] = 0;

    drops[i]++;
  }
}

setInterval(draw, 33);
</script>

</body>
</html>
