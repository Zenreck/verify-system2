<!DOCTYPE html>
<html>
<head>
  <title>Login System</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: white;
    }

    .card {
      background: #1e293b;
      padding: 25px;
      border-radius: 14px;
      width: 320px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }

    input {
      width: 90%;
      padding: 10px;
      margin: 8px 0;
      border-radius: 8px;
      border: none;
      outline: none;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-top: 8px;
      border: none;
      border-radius: 8px;
      background: #38bdf8;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #0ea5e9;
    }

    .msg {
      margin-top: 10px;
      font-size: 14px;
      word-wrap: break-word;
    }

    .hidden {
      display: none;
    }
  </style>
</head>

<body>

<div class="card">
  <h2>Login 😎</h2>

  <input id="phone" placeholder="Phone number (+1...)" />

  <button onclick="sendCode()">Send Code</button>

  <div id="verifyBox" class="hidden">
    <input id="code" placeholder="Enter code" />
    <button onclick="verify()">Verify</button>
  </div>

  <p class="msg" id="msg"></p>
</div>

<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
/* =========================
   🔐 SUPABASE SETUP
========================= */
const supabaseUrl = "https://emookzuveekpfqbehcjs.supabase.co";
const supabaseKey = "sb_publishable_XUZwKSJb_dsiYTkeEK79yw_lpCW5u9p";

const client = supabase.createClient(supabaseUrl, supabaseKey);

/* =========================
   📲 STATE
========================= */
let generatedCode = "";
let currentPhone = "";

/* =========================
   🚀 SEND CODE (DEBUG SMS)
========================= */
async function sendCode() {
  const phone = document.getElementById("phone").value;

  if (!phone) {
    document.getElementById("msg").innerText = "⚠️ Enter phone number";
    return;
  }

  currentPhone = phone;

  generatedCode = Math.floor(100000 + Math.random() * 900000).toString();

  document.getElementById("msg").innerText = "📲 Sending SMS...";

  try {
    const res = await fetch("https://api.textbee.dev/sms/send", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer 33a89932-1944-4e37-8c09-c58b18136575"
      },
      body: JSON.stringify({
        to: phone,
        message: `Your login code is: ${generatedCode}`
      })
    });

    // 🔥 IMPORTANT: show real response
    const text = await res.text();
    console.log("TEXTBEE RESPONSE:", text);

    if (!res.ok) {
      document.getElementById("msg").innerText =
        "❌ SMS failed: " + text;
      return;
    }

    document.getElementById("msg").innerText = "✅ Code sent!";
    document.getElementById("verifyBox").classList.remove("hidden");

    // save user in Supabase
    await client.from("users").upsert([
      { phone: phone, verified: false }
    ]);

  } catch (err) {
    console.error(err);
    document.getElementById("msg").innerText =
      "❌ Network error sending SMS";
  }
}

/* =========================
   🔐 VERIFY CODE
========================= */
async function verify() {
  const code = document.getElementById("code").value;

  if (code === generatedCode) {

    document.getElementById("msg").innerText = "✅ Login success!";

    await client
      .from("users")
      .update({ verified: true })
      .eq("phone", currentPhone);

    setTimeout(() => {
      alert("🎉 Welcome! Dashboard unlocked");
    }, 500);

  } else {
    document.getElementById("msg").innerText = "❌ Wrong code";
  }
}
</script>

</body>
</html>
