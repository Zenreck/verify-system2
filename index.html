<!DOCTYPE html>
<html>
<head>
  <title>SaaS Support System</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: black;
      color: white;
      overflow: hidden;
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      z-index: -1;
    }

    .login {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: rgba(30,30,30,0.9);
      padding: 20px;
      border-radius: 14px;
      width: 340px;
      text-align: center;
      backdrop-filter: blur(10px);
    }

    input {
      width: 90%;
      padding: 10px;
      margin: 6px 0;
      border-radius: 8px;
      border: none;
      background: #111;
      color: white;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-top: 8px;
      border-radius: 8px;
      border: none;
      background: #3b82f6;
      color: white;
      cursor: pointer;
    }

    .adminBtn {
      background: #ef4444;
    }

    .app {
      display: none;
      height: 100vh;
    }

    .sidebar {
      width: 240px;
      height: 100vh;
      position: fixed;
      background: rgba(20,20,20,0.9);
      padding: 10px;
    }

    .main {
      margin-left: 240px;
      padding: 15px;
    }

    .panel {
      background: rgba(40,40,40,0.6);
      padding: 12px;
      border-radius: 10px;
      margin-bottom: 10px;
    }

    #chatBox, #adminChat, #guestChat {
      height: 150px;
      overflow-y: auto;
      background: #111;
      padding: 10px;
      border-radius: 8px;
      font-size: 14px;
    }

    .hidden { display:none; }
  </style>
</head>

<body>

<canvas id="matrix"></canvas>

<!-- LOGIN -->
<div id="login" class="login">
  <div class="card">

    <h2>SAAS LOGIN</h2>

    <input id="phone" placeholder="Phone number" />

    <button onclick="sendCode()">Send Code</button>
    <button class="adminBtn" onclick="adminLogin()">Admin Login</button>

    <div id="verifyBox" class="hidden">
      <input id="code" placeholder="Enter code" />
      <button onclick="verify()">Verify</button>
    </div>

    <p id="msg"></p>

    <!-- 💬 GUEST SUPPORT CHAT -->
    <div class="panel">
      <h3>💬 Support Chat</h3>

      <div id="guestChat"></div>

      <input id="guestMsg" placeholder="Ask support..." />
      <button onclick="sendGuestMsg()">Send</button>
    </div>

  </div>
</div>

<!-- APP -->
<div id="app" class="app">

  <div class="sidebar">
    <h3>Dashboard</h3>

    <p>User: <span id="userPhone"></span></p>
    <p>Role: <span id="role"></span></p>

    <button onclick="logout()" style="background:#ef4444;">Logout</button>
  </div>

  <div class="main">

    <!-- USER CHAT -->
    <div class="panel">
      <h3>💬 Your Support Chat</h3>

      <div id="chatBox"></div>

      <input id="chatInput" placeholder="Message admin..." />
      <button onclick="sendMessage()">Send</button>
    </div>

    <!-- ADMIN PANEL -->
    <div id="adminPanel" class="panel hidden">
      <h3>👑 Admin Panel</h3>

      <div id="userList"></div>

      <div id="adminChat"></div>

      <input id="adminMsg" placeholder="Reply..." />
      <button onclick="sendAdminMessage()">Send</button>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
/* =========================
   SUPABASE
========================= */
const client = supabase.createClient(
  "https://emookzuveekpfqbehcjs.supabase.co",
  "sb_publishable_XUZwKSJb_dsiYTkeEK79yw_lpCW5u9p"
);

/* =========================
   STATE
========================= */
let phone = "";
let role = "user";
let code = "";
let activeUser = null;

/* =========================
   LOGIN
========================= */
function adminLogin() {
  phone = "3502287887";
  role = "admin";
  sendCode();
}

async function sendCode() {
  phone = document.getElementById("phone").value || phone;
  if (!phone) return msg("Enter phone");

  code = Math.floor(100000 + Math.random() * 900000).toString();

  await fetch(
    "https://api.textbee.dev/api/v1/gateway/devices/69ed9e62b5cd3ce4c792ae3e/send-sms",
    {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-api-key": "33a89932-1944-4e37-8c09-c58b18136575"
      },
      body: JSON.stringify({
        recipients: [phone],
        message: "CODE: " + code
      })
    }
  );

  document.getElementById("verifyBox").classList.remove("hidden");
  msg("Code sent");
}

async function verify() {
  if (document.getElementById("code").value !== code)
    return msg("Wrong code");

  await client.from("users").upsert({
    phone,
    role,
    verified: true
  });

  openApp();
}

/* =========================
   OPEN APP
========================= */
function openApp() {
  document.getElementById("login").style.display = "none";
  document.getElementById("app").style.display = "block";

  document.getElementById("userPhone").innerText = phone;
  document.getElementById("role").innerText = role;

  if (role === "admin") {
    document.getElementById("adminPanel").classList.remove("hidden");
    loadUsers();
  }

  loadChat(); // 🔥 FIXED
}

/* =========================
   USER CHAT
========================= */
async function sendMessage() {
  const msg = document.getElementById("chatInput").value;
  if (!msg) return;

  await client.from("messages").insert({
    phone,
    sender: "user",
    message: msg
  });

  document.getElementById("chatInput").value = "";
  loadChat();
}

async function loadChat() {
  const { data } = await client
    .from("messages")
    .select("*")
    .eq("phone", phone)
    .order("created_at", { ascending: true });

  const box = document.getElementById("chatBox");
  box.innerHTML = "";

  data.forEach(m => {
    box.innerHTML += `<div><b>${m.sender}:</b> ${m.message}</div>`;
  });
}

/* =========================
   GUEST CHAT (LOGIN PAGE)
========================= */
async function sendGuestMsg() {
  const msg = document.getElementById("guestMsg").value;
  if (!msg) return;

  await client.from("messages").insert({
    phone: phone || "guest",
    sender: "guest",
    message: msg
  });

  document.getElementById("guestMsg").value = "";
  loadGuestChat();
}

async function loadGuestChat() {
  const { data } = await client
    .from("messages")
    .select("*")
    .eq("phone", phone || "guest")
    .order("created_at", { ascending: true });

  const box = document.getElementById("guestChat");
  box.innerHTML = "";

  data.forEach(m => {
    box.innerHTML += `<div><b>${m.sender}:</b> ${m.message}</div>`;
  });
}

/* =========================
   ADMIN CHAT
========================= */
async function loadUsers() {
  const { data } = await client.from("messages").select("phone");

  const unique = [...new Set(data.map(d => d.phone))];

  const list = document.getElementById("userList");
  list.innerHTML = "<h4>Users</h4>";

  unique.forEach(p => {
    const b = document.createElement("button");
    b.innerText = p;
    b.onclick = () => openAdminChat(p);
    list.appendChild(b);
  });
}

async function openAdminChat(userPhone) {
  activeUser = userPhone;

  const { data } = await client
    .from("messages")
    .select("*")
    .eq("phone", userPhone)
    .order("created_at", { ascending: true });

  const box = document.getElementById("adminChat");
  box.innerHTML = "";

  data.forEach(m => {
    box.innerHTML += `<div><b>${m.sender}:</b> ${m.message}</div>`;
  });
}

async function sendAdminMessage() {
  const msg = document.getElementById("adminMsg").value;
  if (!msg || !activeUser) return;

  await client.from("messages").insert({
    phone: activeUser,
    sender: "admin",
    message: msg
  });

  document.getElementById("adminMsg").value = "";
  openAdminChat(activeUser);
}

/* =========================
   AUTO REFRESH FIX
========================= */
setInterval(() => {
  if (phone) loadChat();
  if (role === "admin" && activeUser) openAdminChat(activeUser);
  loadGuestChat();
}, 3000);

/* =========================
   LOGOUT
========================= */
function logout() {
  location.reload();
}

function msg(t) {
  document.getElementById("msg").innerText = t;
}

/* =========================
   MATRIX BG
========================= */
const c = document.getElementById("matrix");
const ctx = c.getContext("2d");
c.width = window.innerWidth;
c.height = window.innerHeight;

let drops = Array(100).fill(1);

setInterval(() => {
  ctx.fillStyle = "rgba(0,0,0,0.05)";
  ctx.fillRect(0,0,c.width,c.height);

  ctx.fillStyle = "#3b82f6";
  ctx.font = "14px monospace";

  for (let i = 0; i < drops.length; i++) {
    ctx.fillText(Math.random() > 0.5 ? "0" : "1", i*14, drops[i]*14);
    if (drops[i]*14 > c.height) drops[i] = 0;
    drops[i]++;
  }
}, 30);
</script>

</body>
</html>
