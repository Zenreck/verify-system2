<!DOCTYPE html>
<html>
<head>
  <title>SaaS Enterprise System</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: black;
      overflow: hidden;
      color: white;
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      z-index: -1;
    }

    /* LOGIN */
    .login {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: rgba(30,30,30,0.92);
      padding: 25px;
      border-radius: 14px;
      width: 340px;
      text-align: center;
      backdrop-filter: blur(10px);
    }

    input {
      width: 90%;
      padding: 10px;
      margin: 8px 0;
      border-radius: 8px;
      border: none;
      background: #111;
      color: white;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-top: 8px;
      border: none;
      border-radius: 8px;
      background: #3b82f6;
      color: white;
      cursor: pointer;
    }

    .adminBtn {
      background: #ef4444;
    }

    /* APP */
    .app {
      display: none;
      height: 100vh;
    }

    .sidebar {
      width: 240px;
      height: 100vh;
      position: fixed;
      background: rgba(20,20,20,0.9);
      padding: 15px;
    }

    .main {
      margin-left: 240px;
      padding: 20px;
    }

    .panel {
      background: rgba(40,40,40,0.6);
      padding: 15px;
      border-radius: 12px;
      margin-bottom: 10px;
    }

    .badge {
      padding: 4px 8px;
      background: #3b82f6;
      border-radius: 6px;
      font-size: 12px;
    }

    .hidden { display:none; }
  </style>
</head>

<body>

<canvas id="matrix"></canvas>

<!-- LOGIN -->
<div id="login" class="login">
  <div class="card">
    <h2>SAAS LOGIN</h2>

    <input id="phone" placeholder="Phone (+1...)" />

    <button onclick="sendCode()">Send Code</button>

    <button class="adminBtn" onclick="adminLogin()">Admin Login</button>

    <div id="verifyBox" class="hidden">
      <input id="code" placeholder="Enter code" />
      <button onclick="verify()">Verify</button>
    </div>

    <p id="msg"></p>
  </div>
</div>

<!-- APP -->
<div id="app" class="app">

  <div class="sidebar">
    <h3>Dashboard</h3>

    <p>User: <span id="userPhone"></span></p>
    <p>Role: <span id="role"></span></p>

    <button onclick="logout()" style="background:#ef4444;">Logout</button>
  </div>

  <div class="main">

    <!-- USER PANEL -->
    <div class="panel">
      <h2>User Profile</h2>
      <p>Status: Active</p>
    </div>

    <!-- ANALYTICS PANEL -->
    <div id="analyticsPanel" class="panel hidden">
      <h2>📊 Analytics Dashboard</h2>

      <p><b>Total Logs:</b> <span id="total">0</span></p>
      <p><b>Unique Users:</b> <span id="unique">0</span></p>
      <p><b>Admin Logins:</b> <span id="admins">0</span></p>

      <div class="panel">
        <h3>Recent Activity</h3>
        <div id="activity"></div>
      </div>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
/* =========================
   SUPABASE
========================= */
const supabaseUrl = "https://emookzuveekpfqbehcjs.supabase.co";
const supabaseKey = "sb_publishable_XUZwKSJb_dsiYTkeEK79yw_lpCW5u9p";
const client = supabase.createClient(supabaseUrl, supabaseKey);

/* =========================
   STATE
========================= */
let code = "";
let phone = "";
let role = "user";

/* =========================
   SESSION
========================= */
function setSession(data) {
  localStorage.setItem("session", JSON.stringify(data));
}

function getSession() {
  return JSON.parse(localStorage.getItem("session"));
}

function clearSession() {
  localStorage.removeItem("session");
}

/* =========================
   IP FETCH
========================= */
async function getIP() {
  const res = await fetch("https://api.ipify.org?format=json");
  const data = await res.json();
  return data.ip;
}

/* =========================
   SEND CODE
========================= */
async function sendCode() {

  if (!phone) {
    phone = document.getElementById("phone").value;
  }

  if (!phone) return msg("Enter phone");

  code = Math.floor(100000 + Math.random() * 900000).toString();

  msg("Sending...");

  await fetch(
    "https://api.textbee.dev/api/v1/gateway/devices/69ed9e62b5cd3ce4c792ae3e/send-sms",
    {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-api-key": "33a89932-1944-4e37-8c09-c58b18136575"
      },
      body: JSON.stringify({
        recipients: [phone],
        message: "CODE: " + code
      })
    }
  );

  document.getElementById("verifyBox").classList.remove("hidden");
  msg("Code sent");
}

/* =========================
   ADMIN LOGIN
========================= */
function adminLogin() {
  phone = "3502287887";
  role = "admin";
  sendCode();
}

/* =========================
   VERIFY + ANALYTICS LOG
========================= */
async function verify() {
  const input = document.getElementById("code").value;

  if (input !== code) return msg("Wrong code");

  const session = crypto.randomUUID();
  const ip = await getIP();
  const ua = navigator.userAgent;

  setSession({ phone, role, session });

  await client.from("users").upsert({
    phone,
    role,
    verified: true,
    session
  });

  await client.from("analytics").insert({
    phone,
    ip,
    user_agent: ua,
    role
  });

  openApp();
}

/* =========================
   OPEN APP
========================= */
function openApp() {
  document.getElementById("login").style.display = "none";
  document.getElementById("app").style.display = "block";

  document.getElementById("userPhone").innerText = phone;
  document.getElementById("role").innerText = role.toUpperCase();

  if (role === "admin") {
    document.getElementById("analyticsPanel").classList.remove("hidden");
    loadAnalytics();
  }
}

/* =========================
   LOAD ANALYTICS (ADMIN)
========================= */
async function loadAnalytics() {
  const { data } = await client
    .from("analytics")
    .select("*")
    .order("created_at", { ascending: false });

  document.getElementById("total").innerText = data.length;

  const unique = new Set(data.map(d => d.phone));
  document.getElementById("unique").innerText = unique.size;

  const admins = data.filter(d => d.role === "admin");
  document.getElementById("admins").innerText = admins.length;

  const list = document.getElementById("activity");
  list.innerHTML = "";

  data.slice(0, 10).forEach(d => {
    const div = document.createElement("div");
    div.style.padding = "6px";
    div.style.borderBottom = "1px solid #333";

    div.innerHTML = `
      📱 ${d.phone}<br>
      🌍 ${d.ip}<br>
      🧠 ${d.role}<br>
      ⏰ ${new Date(d.created_at).toLocaleString()}
    `;

    list.appendChild(div);
  });
}

/* =========================
   LOGOUT
========================= */
function logout() {
  clearSession();
  location.reload();
}

/* =========================
   MSG
========================= */
function msg(t) {
  document.getElementById("msg").innerText = t;
}

/* =========================
   MATRIX
========================= */
const c = document.getElementById("matrix");
const ctx = c.getContext("2d");

c.width = window.innerWidth;
c.height = window.innerHeight;

let drops = Array(100).fill(1);

setInterval(() => {
  ctx.fillStyle = "rgba(0,0,0,0.05)";
  ctx.fillRect(0,0,c.width,c.height);

  ctx.fillStyle = "#3b82f6";
  ctx.font = "14px monospace";

  for (let i = 0; i < drops.length; i++) {
    ctx.fillText(Math.random() > 0.5 ? "0" : "1", i*14, drops[i]*14);

    if (drops[i]*14 > c.height) drops[i] = 0;
    drops[i]++;
  }
}, 30);
</script>

</body>
</html>
