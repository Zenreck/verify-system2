<!DOCTYPE html>
<html>
<head>
  <title>Pro Auth System</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0a0a0a;
      overflow: hidden;
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      z-index: -1;
    }

    /* LOGIN */
    .loginWrap {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: rgba(30,30,30,0.9);
      backdrop-filter: blur(12px);
      padding: 25px;
      border-radius: 16px;
      width: 340px;
      color: white;
      text-align: center;
      box-shadow: 0 0 25px rgba(0,0,0,0.6);
    }

    input {
      width: 90%;
      padding: 10px;
      margin: 8px 0;
      border-radius: 8px;
      border: none;
      outline: none;
      background: #111;
      color: white;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-top: 8px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      background: #3b82f6;
      color: white;
    }

    .adminBtn {
      background: #ef4444;
    }

    /* DASHBOARD */
    .app {
      display: none;
      height: 100vh;
      color: white;
    }

    .sidebar {
      width: 220px;
      background: rgba(20,20,20,0.9);
      height: 100vh;
      position: fixed;
      padding: 15px;
    }

    .main {
      margin-left: 220px;
      padding: 20px;
    }

    .panel {
      background: rgba(40,40,40,0.6);
      padding: 20px;
      border-radius: 12px;
    }

    .logout {
      background: #ef4444;
      margin-top: 10px;
    }

    .hidden { display:none; }
  </style>
</head>

<body>

<canvas id="matrix"></canvas>

<!-- LOGIN -->
<div id="login" class="loginWrap">
  <div class="card">
    <h2>PRO LOGIN</h2>

    <input id="phone" placeholder="Phone (+1...)" />

    <button onclick="sendCode()">Send Code</button>

    <button class="adminBtn" onclick="adminLogin()">
      Sign in as Admin
    </button>

    <div id="verifyBox" class="hidden">
      <input id="code" placeholder="Enter code" />
      <button onclick="verify()">Verify</button>
    </div>

    <p id="msg"></p>
  </div>
</div>

<!-- DASHBOARD -->
<div id="app" class="app">

  <div class="sidebar">
    <h3>Dashboard</h3>
    <p id="roleText">User</p>
    <button class="logout" onclick="logout()">Logout</button>
  </div>

  <div class="main">
    <div class="panel">
      <h2>Welcome</h2>
      <p><b>Phone:</b> <span id="userPhone"></span></p>
      <p><b>Status:</b> Logged in</p>
    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
/* =========================
   SUPABASE
========================= */
const supabaseUrl = "https://emookzuveekpfqbehcjs.supabase.co";
const supabaseKey = "sb_publishable_XUZwKSJb_dsiYTkeEK79yw_lpCW5u9p";
const client = supabase.createClient(supabaseUrl, supabaseKey);

/* =========================
   STATE
========================= */
let code = "";
let phone = "";
let role = "user";

/* =========================
   SESSION (PRO STYLE)
========================= */
function setSession(data) {
  localStorage.setItem("session", JSON.stringify(data));
}

function getSession() {
  return JSON.parse(localStorage.getItem("session"));
}

function clearSession() {
  localStorage.removeItem("session");
}

/* =========================
   AUTO LOGIN
========================= */
window.onload = () => {
  const s = getSession();
  if (s) {
    openApp(s.phone, s.role);
  }
};

/* =========================
   ADMIN LOGIN
========================= */
function adminLogin() {
  phone = "3502287887";
  role = "admin";
  sendCode();
}

/* =========================
   SEND CODE
========================= */
async function sendCode() {

  if (!phone) {
    phone = document.getElementById("phone").value;
    role = "user";
  }

  if (!phone) return msg("Enter phone");

  code = Math.floor(100000 + Math.random() * 900000).toString();

  msg("Sending...");

  const res = await fetch(
    "https://api.textbee.dev/api/v1/gateway/devices/69ed9e62b5cd3ce4c792ae3e/send-sms",
    {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-api-key": "33a89932-1944-4e37-8c09-c58b18136575"
      },
      body: JSON.stringify({
        recipients: [phone],
        message: "CODE: " + code
      })
    }
  );

  const text = await res.text();
  console.log(text);

  if (!res.ok) return msg("SMS FAILED");

  document.getElementById("verifyBox").classList.remove("hidden");
  msg("Code sent");
}

/* =========================
   VERIFY
========================= */
async function verify() {
  const input = document.getElementById("code").value;

  if (input === code) {

    setSession({ phone, role });

    await client.from("users").upsert([
      { phone, verified: true, role }
    ]);

    openApp(phone, role);

  } else {
    msg("Wrong code");
  }
}

/* =========================
   OPEN APP
========================= */
function openApp(p, r) {
  document.getElementById("login").style.display = "none";
  document.getElementById("app").style.display = "block";

  document.getElementById("userPhone").innerText = p;
  document.getElementById("roleText").innerText = r.toUpperCase();
}

/* =========================
   LOGOUT
========================= */
function logout() {
  clearSession();
  location.reload();
}

/* =========================
   MSG
========================= */
function msg(t) {
  document.getElementById("msg").innerText = t;
}

/* =========================
   MATRIX BACKGROUND
========================= */
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

canvas.height = window.innerHeight;
canvas.width = window.innerWidth;

let chars = "01".split("");
let drops = Array(100).fill(1);

function draw() {
  ctx.fillStyle = "rgba(0,0,0,0.05)";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle = "#3b82f6";
  ctx.font = "14px monospace";

  for (let i = 0; i < drops.length; i++) {
    let text = chars[Math.floor(Math.random()*chars.length)];
    ctx.fillText(text, i*14, drops[i]*14);

    if (drops[i]*14 > canvas.height) drops[i] = 0;
    drops[i]++;
  }
}

setInterval(draw, 30);
</script>

</body>
</html>
